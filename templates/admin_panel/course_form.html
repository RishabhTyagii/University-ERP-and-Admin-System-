{% extends 'admin_panel/admin_base.html' %}

{% block admin_content %}
<h2 class="mb-3">{{ title }}</h2>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary">Save</button>
        </form>
    </div>
</div>
{% endblock %}
