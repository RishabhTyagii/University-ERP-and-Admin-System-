{% extends 'admin_panel/admin_base.html' %}

{% block admin_content %}
<h2 class="mb-4">Admin Dashboard</h2>

<div class="row g-4">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Total Courses</h5>
                <h3>{{ total_courses }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Total Students</h5>
                <h3>{{ total_students }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Total Results</h5>
                <h3>{{ total_results }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Fee Structures</h5>
                <h3>{{ total_fees }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Contact Messages</h5>
                <h3>{{ total_messages }}</h3>
            </div>
        </div>
    </div>
</div>
{% endblock %}
