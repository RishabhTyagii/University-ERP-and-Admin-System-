{% extends 'base.html' %}

{% block content %}
<div class="page-banner">
    <div class="container">
        <h1><i class="fas fa-user-circle me-2"></i>Student ERP Portal</h1>
        <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li><li class="breadcrumb-item active">Student ERP</li></ol></nav>
    </div>
</div>

<div class="container">
    <div class="row g-4">

        <!-- Sidebar -->
        <div class="col-lg-3 col-md-4">
            <div class="uni-card sticky-md-top" style="top:70px;">
                <!-- Student Mini Profile -->
                <div style="background:linear-gradient(135deg,#0d2b55,#1a3d6e);border-radius:10px 10px 0 0;padding:20px;text-align:center;">
                    <div style="width:60px;height:60px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#f5a623;margin:0 auto 10px;">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <div style="font-family:'Noto Serif',serif;font-weight:700;color:#fff;font-size:0.95rem;margin-bottom:4px;">{{ request.user }}</div>
                    <div style="font-size:0.72rem;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.5px;">Student ERP</div>
                </div>

                <!-- Nav Links -->
                <div class="p-2">
                    <a href="{% url 'student_dashboard' %}" class="erp-nav-link {% if request.resolver_match.url_name == 'student_dashboard' %}active{% endif %}">
                        <i class="fas fa-th-large me-2"></i>Dashboard
                    </a>
                    <a href="{% url 'student_profile' %}" class="erp-nav-link {% if request.resolver_match.url_name == 'student_profile' %}active{% endif %}">
                        <i class="fas fa-id-badge me-2"></i>My Profile
                    </a>
                    <a href="{% url 'student_results' %}" class="erp-nav-link {% if request.resolver_match.url_name == 'student_results' %}active{% endif %}">
                        <i class="fas fa-poll-h me-2"></i>My Results
                    </a>
                    <div style="border-top:1px solid #dce4ef;margin:8px 0;"></div>
                    <a href="{% url 'student_logout' %}" class="erp-nav-link" style="color:#c0392b;">
                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-lg-9 col-md-8">
            {% block student_content %}{% endblock %}
        </div>

    </div>
</div>

<style>
.erp-nav-link {
    display: flex; align-items: center;
    padding: 10px 14px; border-radius: 8px;
    font-size: 0.875rem; font-weight: 600;
    color: #1a2540; text-decoration: none;
    transition: all 0.2s; margin-bottom: 2px;
}
.erp-nav-link:hover { background: #f0f4fb; color: #0d2b55; }
.erp-nav-link.active { background: #0d2b55; color: #fff !important; }
.erp-nav-link.active i { color: #f5a623; }
</style>
{% endblock %}
